name: teste-whats

services:
  mongo:
    image: mongo:7
    container_name: teste-whats-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - teste_whats_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    container_name: teste-whats-bridge
    restart: unless-stopped
    environment:
      BRIDGE_PORT: 8081
      BRIDGE_AUTH_DIR: /app/data/auth
      BRIDGE_START_TIMEOUT_MS: 20000
      BRIDGE_LOG_LEVEL: info
    ports:
      - "8081:8081"
    volumes:
      - ./bridge:/app
      - teste_whats_bridge_node_modules:/app/node_modules
      - teste_whats_bridge_auth:/app/data/auth

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: teste-whats-api
    restart: unless-stopped
    depends_on:
      bridge:
        condition: service_started
      mongo:
        condition: service_healthy
    env_file:
      - ./api/.env.example
    environment:
      APP_ENV: docker
      APP_DEBUG: "true"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: teste_whats
      WHATSAPP_BRIDGE_ENABLED: "true"
      WHATSAPP_BRIDGE_BASE_URL: http://bridge:8081
      BACKEND_CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    volumes:
      - ./api/app:/app/app

volumes:
  teste_whats_mongo_data:
  teste_whats_bridge_node_modules:
  teste_whats_bridge_auth:
